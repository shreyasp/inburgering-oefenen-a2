          text: Een tijdelijk contract.
        - label: B
          text: Een uitzendcontract.
        - label: C
          text: Een contract voor onbepaalde tijd.
      correct_answer: C
    - questiontext: Hoe lang is de proeftijd?
      options:
        - label: A
          text: Eén maand.
        - label: B
          text: Drie maanden.
        - label: C
          text: Twee maanden.
      correct_answer: C
    - questiontext: Hoeveel vakantiedagen krijgt Sara?
      options:
        - label: A
          text: 20 dagen.
        - label: B
          text: 28 dagen.
        - label: C
          text: 22 dagen.
      correct_answer: C
- id: 55
  title: CAO-afspraken
  difficulty: medium
  text: >
    Mohamed werkt bij een bouwbedrijf in Groningen. Zijn werkgever heeft een CAO (Collectieve Arbeidsovereenkomst) met
    de vakbond. In de CAO staan afspraken over salaris, werktijden en vakanties.

    Volgens de CAO krijgt Mohamed 13% toeslag als hij 's avonds werkt. In het weekend is de toeslag 50%. Mohamed werkt
    vaak op zaterdag. Dat levert hem extra geld op.

    De CAO wordt elke twee jaar vernieuwd. De vakbond onderhandelt namens de werknemers. Mohamed is lid van de vakbond.
    Dat kost € 15 per maand, maar hij krijgt er ook juridische hulp voor terug.
  questions:
    - questiontext: Wat staat er in een CAO?
      options:
        - label: A
          text: Alleen afspraken over salaris.
        - label: B
          text: Alleen afspraken over vakanties.
        - label: C
          text: Afspraken over salaris, werktijden en vakanties.
      correct_answer: C
    - questiontext: Hoeveel toeslag krijgt Mohamed in het weekend?
      options:
        - label: A
          text: 13%.
        - label: B
          text: 25%.
        - label: C
          text: 50%.
      correct_answer: C
- id: 57
  title: Thuiswerken
  difficulty: medium
  text: >-
    Amina werkt als administratief medewerker bij een verzekeringsbedrijf in Arnhem. Sinds corona werkt ze drie dagen
    per week thuis en twee dagen op kantoor. Haar baas vindt dit goed.

    Thuis heeft Amina een aparte werkkamer. Ze heeft een bureau, een goede stoel en een tweede scherm. Het bedrijf
    betaalt € 250 voor thuiswerkvoorzieningen.

    Op kantoor ziet Amina haar collega's. Ze vinden het belangrijk om samen te werken en ideeën uit te wisselen. Thuis
    kan ze zich beter concentreren op haar werk. Ze is productiever dan op kantoor.
     Amina gaat nog naar kantoor om haar collega's te zien en samen te werken.
  questions:
    - questiontext: Hoeveel dagen per week werkt Amina thuis?
      options:
        - label: A
          text: Twee dagen.
        - label: B
          text: Vier dagen.
        - label: C
          text: Drie dagen.
      correct_answer: C
    - questiontext: Hoeveel betaalt het bedrijf voor thuiswerkvoorzieningen?
      options:
        - label: A
          text: € 150.
        - label: B
          text: € 350.
        - label: C
          text: € 250.
      correct_answer: C
    - questiontext: Waarom gaat Amina nog naar kantoor?
      options:
        - label: A
          text: Om haar collega's te zien en samen te werken.
        - label: B
          text: Omdat ze thuis niet kan werken.
        - label: C
          text: Omdat haar baas dat verplicht.
      correct_answer: A
- id: 59
  title: Uitzendbureau
