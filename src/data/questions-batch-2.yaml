  text: >
    Meneer Yilmaz heeft een betaalachterstand van € 450 voor zijn huur. Hij heeft drie maanden geen huur betaald omdat
    hij zijn baan is kwijtgeraakt. De verhuurder stuurt een aanmaning. Meneer Yilmaz is erg bezorgd over de situatie.

