    Meneer Yilmaz vraagt ook hulp bij de gemeente. De gemeente kan hem een bijzondere bijstand geven als hij aan de
    voorwaarden voldoet. Hij moet dan wel meewerken aan een traject naar werk. De gemeente helpt hem ook met
    solliciteren en het zoeken naar een nieuwe baan.
