  title: Ontslag en opzegtermijn
  difficulty: hard
  text: >
    Mevrouw Ahmed werkt al vijf jaar bij een kantoorgebouw in Leiden. Ze krijgt te horen dat haar werkgever haar wil
    ontslaan wegens bedrijfseconomische redenen. Het bedrijf gaat reorganiseren en er zijn minder banen. Mevrouw Ahmed
    is geschrokken maar begrijpt de situatie.

    De werkgever vraagt ontslag aan bij het UWV. Na toestemming mag hij het contract beëindigen. Mevrouw Ahmed heeft een
    opzegtermijn van twee maanden. Ze werkt dus nog twee maanden door. In deze periode zoekt ze actief naar een nieuwe
    baan.

    Omdat mevrouw Ahmed langer dan twee jaar heeft gewerkt, heeft ze recht op een transitievergoeding. De vergoeding is
    1/3 van haar maandsalaris per gewerkt jaar. Bij vijf jaar werk krijgt ze 5/3 deel van haar salaris. Dit is wettelijk
    bepaald.

    Mevrouw Ahmed meldt zich ook aan bij het uitzendbureau en schrijft zich in bij de gemeente als werkzoekende. Ze
    krijgt mogelijk een WW-uitkering als ze voldoet aan de eisen. Ze moet dan wel solliciteren op passende vacatures.
  questions:
    - questiontext: Waarom wordt mevrouw Ahmed ontslagen?
      options:
        - label: A
          text: Omdat ze slecht presteert.
        - label: B
          text: Omdat het bedrijf reorganiseert.
        - label: C
          text: Omdat ze te vaak ziek is.
      correct_answer: B
    - questiontext: Hoeveel transitievergoeding krijgt mevrouw Ahmed?
      options:
        - label: A
          text: 1/3 van haar maandsalaris.
        - label: B
          text: 5/3 deel van haar maandsalaris.
        - label: C
          text: 5 maanden salaris.
      correct_answer: B
- id: 91
  title: Pensioen opbouwen
  difficulty: hard
  text: >
    Meneer Bakker is 62 jaar en werkt nog drie jaar. Hij gaat met pensioen als hij 65 is. Hij heeft zijn hele leven
    gewerkt en pensioen opgebouwd bij ABP Pensioenfonds. Hij woont in een koopwoning in Arnhem en heeft geen hypotheek
    meer.

    Zijn pensioen bestaat uit twee delen: AOW van de overheid en een werkgeverspensioen. De AOW krijgt hij automatisch
    als hij 67 is. Omdat meneer Bakker eerder stopt, krijgt hij twee jaar lang geen AOW. Dit is een belangrijke keuze
    die hij heeft gemaakt.

    Zijn werkgeverspensioen is € 1.400 per maand. Dat is genoeg om van te leven, maar hij moet wel bezuinigen. Hij zegt:
    "Ik ga minder uit eten en ik koop geen nieuwe kleding meer." Hij kookt vaker thuis en doet meer boodschappen in de
    aanbieding.

    Meneer Bakker had eerder kunnen stoppen als hij meer had gespaard. Hij heeft nu een spaarpot van € 30.000. Dat
    gebruikt hij als buffer voor onverwachte kosten. Hij is tevreden met zijn situatie en geniet van zijn vrije tijd.
  questions:
    - questiontext: Waarom krijgt meneer Bakker twee jaar lang geen AOW?
      options:
        - label: A
          text: Omdat hij te weinig heeft gewerkt.
        - label: B
          text: Omdat hij met pensioen gaat voordat hij 67 is.
        - label: C
          text: Omdat hij geen AOW heeft aangevraagd.
      correct_answer: B
    - questiontext: Hoeveel werkgeverspensioen krijgt meneer Bakker per maand?
      options:
        - label: A
          text: € 1.200.
        - label: B
          text: € 1.400.
        - label: C
          text: € 1.600.
      correct_answer: B
