    Peter kiest Verzekering A. Hij zegt: "Ik heb geen dure spullen, dus ik hoef geen dure verzekering. De goedkopere
    verzekering is goed genoeg voor mij." Hij betaalt nu € 96 per jaar in plaats van € 144.
