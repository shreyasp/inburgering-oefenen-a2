      options:
        - label: A
          text: Label C.
        - label: B
          text: Label A.
        - label: C
          text: Label G.
      correct_answer: A
    - questiontext: Welk energielabel is het beste?
      options:
        - label: A
          text: Label A.
        - label: B
          text: Label C.
        - label: C
          text: Label G.
      correct_answer: A
    - questiontext: Wanneer krijgt ze de borg terug?
