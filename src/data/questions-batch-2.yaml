      options:
        - label: A
          text: Verzekering A, want die is goedkoper.
        - label: B
          text: Verzekering B, want die dekt meer schade.
        - label: C
          text: Verzekering A, want Peter heeft weinig dure spullen.
        - label: D
          text: Het maakt niet uit, ze zijn hetzelfde.
      correct_answer: C
    - questiontext: Wat is het eigen risico van Verzekering B?
