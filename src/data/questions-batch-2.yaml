- id: 42
  title: Inschrijving bij woningcorporatie
  difficulty: easy
  text: >-
    Khalid zoekt een sociale huurwoning in Rotterdam. Hij schrijft zich in bij woningcorporatie Haven. De inschrijving
    is gratis. Hij moet 18 jaar of ouder zijn en een inkomen hebben van maximaal € 44.000 per jaar.

    Na inschrijving krijgt Khalid een nummer. Hoe langer hij wacht, hoe hoger zijn nummer. Gemiddeld wacht hij 8 jaar op
    een woning. Hij reageert elke week op woningen via de website.
     De inschrijving kost niets, het is gratis.
  questions:
