  title: Oplevering en onderhoud
  difficulty: medium
  text: >-
    Fatima gaat verhuizen naar een nieuwe woning in Nijmegen. Voordat ze intrekt, is er een oplevering. Samen met de
    verhuurder loopt ze door het huis. Ze controleren of alles in goede staat is.

    Op het opleveringsrapport staat dat de muren een nieuwe verfbeurt nodig hebben. De verhuurder belooft dit voor de
    verhuizing te doen. Fatima tekent het rapport.

    Na de oplevering is Fatima verantwoordelijk voor klein onderhoud. Ze moet zelf de ramen lappen, de afvoer ontstoppen
    en rookmelderbatterijen vervangen. De verhuurder doet groot onderhoud, zoals een nieuwe dakbedekking of schilderwerk
    buiten.
     Bij de oplevering controleren de verhuurder en huurder de staat van het huis. Op het opleveringsrapport staat wat gerepareerd moet worden.
  questions:
    - questiontext: Wat gebeurt er bij een oplevering?
      options:
        - label: A
          text: De huurder betaalt de huur.
        - label: B
          text: De huurder tekent het huurcontract.
        - label: C
          text: De verhuurder en huurder controleren de staat van het huis.
      correct_answer: C
    - questiontext: Wat moet Fatima zelf doen na de oplevering?
      options:
        - label: A
          text: Het dak repareren.
        - label: B
          text: Het huis buiten schilderen.
        - label: C
          text: De ramen lappen.
      correct_answer: C
    - questiontext: Wie is verantwoordelijk voor groot onderhoud?
      options:
        - label: A
          text: De huurder.
        - label: B
          text: De gemeente.
        - label: C
          text: De verhuurder.
      correct_answer: C
    - questiontext: Wat staat er op het opleveringsrapport?
      options:
        - label: A
          text: De huurprijs.
        - label: B
          text: De naam van de buren.
        - label: C
          text: De staat van het huis en wat gerepareerd moet worden.
      correct_answer: C
