- id: 49
  title: Sollicitatiegesprek voorbereiden
  difficulty: medium
  text: >-
    Hassan heeft een sollicitatiegesprek bij een logistiek bedrijf in Breda. Het gesprek is dinsdag om 14:00 uur op de
    tweede verdieping. Hij moet zich melden bij de receptie.

    Hassan neemt zijn cv, diploma's en een pen mee. Hij draagt een net overhemd en een donkere broek. De manager vraagt
    naar zijn ervaring, zijn sterke punten en waarom hij bij dit bedrijf wil werken.

    Hassan heeft thuis geoefend. Hij zegt: "Ik werk graag in een team en ik ben altijd op tijd." De manager is tevreden.
    Na het gesprek hoort Hassan binnen een week of hij de baan krijgt.
     Hassan neemt zijn CV en paspoort mee. Hij neemt geen laptop mee.
  questions:
    - questiontext: Wanneer is het sollicitatiegesprek?
      options:
        - label: A
          text: Maandag om 14:00 uur.
        - label: B
          text: Dinsdag om 10:00 uur.
        - label: C
          text: Dinsdag om 14:00 uur.
      correct_answer: C
    - questiontext: Wat neemt Hassan NIET mee?
      options:
        - label: A
          text: Een laptop.
        - label: B
          text: Zijn cv.
        - label: C
          text: Zijn diploma's.
      correct_answer: A
    - questiontext: Hoe lang duurt het voordat Hassan hoort of hij de baan krijgt?
      options:
        - label: A
          text: Binnen een dag.
        - label: B
          text: Binnen een maand.
        - label: C
          text: Binnen een week.
      correct_answer: C
- id: 52
  title: Arbeidscontract tekenen
  difficulty: medium
  text: >
    Sara krijgt een arbeidscontract bij een zorginstelling in Eindhoven. Het is een contract voor onbepaalde tijd. Ze
    werkt 32 uur per week. Haar salaris is € 2.400 bruto per maand.

    In het contract staat dat ze een proeftijd van twee maanden heeft. In deze periode kan ze stoppen zonder reden. Na
    de proeftijd moet ze zich aan de opzegtermijn van één maand houden.

    Sara leest ook over vakantiedagen. Ze krijgt 28 vakantiedagen per jaar, op basis van een fulltime dienstverband.
    Omdat ze parttime werkt, krijgt ze 22,4 dagen. Ze rondt dit af naar 22 dagen.
  questions:
