- id: 31
  title: Vakantie en ziekte op het werk
  difficulty: easy
  text: >-
    Fatima werkt bij een supermarkt in Utrecht. Ze heeft recht op 20 vakantiedagen per jaar. In juli wil ze 10 dagen op
    vakantie naar Marokko. Ze vraagt haar manager, meneer De Vries, om vakantie. Dat mag.

    Als Fatima ziek is, moet ze zich voor 9:00 uur 's ochtends ziek melden. Ze belt dan naar het werk. Niet appen, niet
    mailen, maar bellen. Na drie dagen heeft ze een verklaring van de dokter nodig.
     Ze meldt zich ziek door te bellen. Na 3 dagen ziekte moet ze een verklaring hebben.
  questions:
    - questiontext: Hoeveel vakantiedagen heeft Fatima per jaar?
      options:
        - label: A
          text: 20 dagen.
        - label: B
          text: 10 dagen.
        - label: C
          text: 30 dagen.
      correct_answer: A
    - questiontext: Hoe moet Fatima zich ziek melden?
      options:
        - label: A
          text: Door te bellen.
        - label: B
          text: Per app.
        - label: C
          text: Per e-mail.
      correct_answer: A
    - questiontext: Wanneer heeft ze een doktersverklaring nodig?
      options:
        - label: A
          text: Na 3 dagen ziekte.
        - label: B
          text: Na 1 dag ziekte.
        - label: C
          text: Na 5 dagen ziekte.
      correct_answer: A
