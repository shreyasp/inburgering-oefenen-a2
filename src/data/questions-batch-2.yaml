  title: Huurcommissie
  difficulty: hard
  text: >
    Meneer Hassan huurt een woning in Amsterdam voor € 950 per maand. Hij vindt de huur te hoog voor de kwaliteit van
    het huis. De woning heeft geen goede isolatie en de keuken is oud. De ramen zijn enkel glas en het is koud in de
    winter.

    Meneer Hassan dient een klacht in bij de huurcommissie. De huurcommissie is een onafhankelijke organisatie die
    huurprijzen beoordeelt. Ze kijken naar het puntenstelsel: hoe meer punten het huis heeft, hoe hoger de maximale huur
    mag zijn. De procedure duurt ongeveer drie maanden.

    De huurcommissie stelt vast dat het huis maximaal € 780 per maand mag kosten volgens het puntenstelsel. De
    verhuurder moet de huur verlagen en het te veel betaalde geld teruggeven. Dit is een bindende uitspraak.

    Meneer Hassan is blij met de uitspraak. Hij betaalt nu € 780 per maand en krijgt € 3.400 terug voor de afgelopen
    twee jaar. Hij kan dit geld gebruiken voor een nieuwe keuken.
  questions:
    - questiontext: Waarom dient meneer Hassan een klacht in?
      options:
        - label: A
          text: Omdat de verhuurder het huis niet repareert.
        - label: B
          text: Omdat hij de huur te hoog vindt voor de kwaliteit.
        - label: C
          text: Omdat hij wil verhuizen.
      correct_answer: B
    - questiontext: Wat beslist de huurcommissie?
      options:
        - label: A
          text: De huur blijft € 950.
        - label: B
          text: De huur wordt verlaagd naar € 780.
        - label: C
          text: De huur wordt verlaagd naar € 600.
      correct_answer: B
- id: 103
  title: Woningruil en VvE
  difficulty: hard
  text: >
    Mevrouw Ahmed wil haar huurwoning in Den Haag ruilen met een woning in Rotterdam. Ze vindt een ruilpartner via
    WoningNet. Beide woningen moeten voldoen aan de eisen van de woningcorporaties. De procedure duurt ongeveer twee
    maanden.

    De corporatie controleert of de woningen passen bij de grootte van het huishouden. Mevrouw Ahmed heeft een
    eengezinswoning en wil een appartement. Haar ruilpartner heeft een appartement en wil een eengezinswoning. De
    corporatie gaat akkoord na een inspectie van beide woningen.

    Intussen koopt meneer De Vries een appartement in Utrecht. Hij wordt automatisch lid van de VvE (Vereniging van
    Eigenaren). De VvE beheert het gebouw en beslist over onderhoud. Alle eigenaren zijn verplicht lid en moeten
    contributie betalen.

    Meneer De Vries betaalt € 180 per maand aan VvE-kosten. Dat is voor schilderwerk, schoonmaak van de trappen en
    verzekering van het gebouw. Hij moet ook aanwezig zijn bij de jaarlijkse vergadering. Daar worden belangrijke
    beslissingen genomen.
  questions:
    - questiontext: Waarom wil mevrouw Ahmed ruilen?
      options:
        - label: A
          text: Omdat haar huis te klein is.
        - label: B
          text: Omdat ze van stad wil veranderen.
        - label: C
          text: Omdat haar huur te hoog is.
      correct_answer: B
    - questiontext: Wat is een taak van de VvE?
      options:
        - label: A
          text: De huur innen.
        - label: B
          text: Het gebouw onderhouden en verzekeren.
        - label: C
          text: De belastingaangifte doen.
      correct_answer: B
- id: 105
  title: Milieuzone
  difficulty: hard
  text: >
    In Amsterdam, Utrecht en Arnhem zijn milieuzones. In deze zones mogen oude, vervuilende auto's niet rijden. De zones
    zijn ingesteld om de luchtkwaliteit te verbeteren. De regels gelden voor dieselauto's ouder dan 2005 en
    benzineauto's ouder dan 1992.

    Meneer Bakker heeft een dieselauto uit 2005. Hij wil naar een afspraak in Utrecht rijden. Hij controleert op de
    website van de gemeente of hij de zone in mag. Dat mag niet, want zijn auto is te oud. Hij had dit eerder moeten
    controleren.

    Meneer Bakker heeft drie opties: hij kan de auto parkeren buiten de zone en met de bus verder reizen, hij kan een
    dagkaart kopen voor € 25, of hij kan een nieuwe auto kopen. Een nieuwe auto kost minimaal € 15.000.

    Meneer Bakker kiest voor de dagkaart. Hij zegt: "Een nieuwe auto is te duur en ik kom maar één keer per maand in
    Utrecht." De dagkaart koopt hij online via de website van de gemeente Utrecht.
  questions:
    - questiontext: Waarom mag meneer Bakker niet de milieuzone in Utrecht in?
      options:
        - label: A
          text: Omdat hij geen parkeervergunning heeft.
        - label: B
          text: Omdat zijn dieselauto uit 2005 te oud is.
        - label: C
          text: Omdat hij geen dagkaart heeft gekocht.
      correct_answer: B
