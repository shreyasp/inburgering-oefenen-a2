    Het huis heeft energielabel C. Dat betekent dat de energiekosten gemiddeld zijn. Label A is het beste en label G is
    het slechtst. Mevrouw El Amrani vindt het huis netjes. De keuken is van 2018 en de ramen hebben dubbel glas.
