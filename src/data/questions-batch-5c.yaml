- id: 119
  title: Parkeertarieven in het centrum
  difficulty: medium
  text: 'De gemeente heeft verschillende parkeerzones met verschillende tarieven.

    Zone     Per uur    Per dag (max)
    Centrum  € 4,50     € 35,00
    Rand     € 2,50     € 20,00
    Buiten   € 1,00     € 8,00

    Parkeren in het centrum is het duurst. Buiten de stad is het goedkoopst. Je kunt per dag betalen of per uur. Als je langer dan acht uur in het centrum parkeert, is het dagtarief goedkoper.

    '
  table:
    headers:
    - Zone
    - Per uur
    - Per dag (max)
    rows:
    - [Centrum, "€ 4,50", "€ 35,00"]
    - [Rand, "€ 2,50", "€ 20,00"]
    - [Buiten, "€ 1,00", "€ 8,00"]
  questions:
  - questiontext: Hoeveel kost parkeren in de zone Rand per dag maximaal?
    options:
    - label: A
      text: € 8,00.
    - label: B
      text: € 20,00.
    - label: C
      text: € 35,00.
    correct_answer: B
  - questiontext: Welke zone is het goedkoopst per uur?
    options:
    - label: A
      text: Centrum.
    - label: B
      text: Rand.
    - label: C
      text: Buiten.
    correct_answer: C
  - questiontext: Wat is het verschil per uur tussen Centrum en Rand?
    options:
    - label: A
      text: € 2,00.
    - label: B
      text: € 3,00.
    - label: C
      text: € 3,50.
    correct_answer: A
