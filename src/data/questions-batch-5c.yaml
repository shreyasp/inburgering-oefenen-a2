- id: 122
  title: Energieleveranciers vergelijken
  difficulty: hard
  text: 'Drie energiebedrijven bieden verschillende contracten aan voor huishoudens.

    Aanbieder     Prijs per kWh   Vastrecht per maand   Looptijd
    GreenPower    € 0,35          € 45,00               1 jaar
    EcoEnergy     € 0,38          € 35,00               3 jaar
    BudgetStroom  € 0,32          € 55,00               1 jaar

    GreenPower heeft een gemiddelde prijs per kWh en een laag vastrecht. EcoEnergy is duurder per kWh maar heeft een lager vastrecht. BudgetStroom is het goedkoopst per kWh maar heeft het hoogste vastrecht. De looptijd is bij EcoEnergy het langst.

    '
  table:
    headers:
    - Aanbieder
    - Prijs per kWh
    - Vastrecht per maand
    - Looptijd
    rows:
    - [GreenPower, "€ 0,35", "€ 45,00", 1 jaar]
    - [EcoEnergy, "€ 0,38", "€ 35,00", 3 jaar]
    - [BudgetStroom, "€ 0,32", "€ 55,00", 1 jaar]
  questions:
  - questiontext: Welke aanbieder heeft de laagste prijs per kWh?
    options:
    - label: A
      text: GreenPower.
    - label: B
      text: BudgetStroom.
    - label: C
      text: EcoEnergy.
    correct_answer: B
  - questiontext: Wat is het verschil in vastrecht per maand tussen BudgetStroom en EcoEnergy?
    options:
    - label: A
      text: € 10,00.
    - label: B
      text: € 15,00.
    - label: C
      text: € 20,00.
    correct_answer: C
  - questiontext: Welke aanbieder heeft het langste contract?
    options:
    - label: A
      text: EcoEnergy.
    - label: B
      text: GreenPower.
    - label: C
      text: BudgetStroom.
    correct_answer: A
