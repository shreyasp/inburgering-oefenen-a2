- id: 106
  title: "Werkrooster zaterdag"
  difficulty: medium
  text: |
    Fatima werkt in zorgcentrum De Vijver in Amersfoort. Haar teamleider stuurt haar het rooster voor zaterdag. Fatima moet op drie verschillende afdelingen werken. De lunchpauze duurt telkens dertig minuten.

    Rooster zaterdag:

    Tijd         De Linde          De Roos           Keuken
    08.00-12.00  Nora en Mehmet    Fatima            Leo
    12.00-16.00  Fatima en Iris    Nora              Mehmet
    16.00-20.00  Iris              Fatima en Leo     Nora
  table:
    headers: ["Tijd", "De Linde", "De Roos", "Keuken"]
    rows:
      - ["08.00-12.00", "Nora en Mehmet", "Fatima", "Leo"]
      - ["12.00-16.00", "Fatima en Iris", "Nora", "Mehmet"]
      - ["16.00-20.00", "Iris", "Fatima en Leo", "Nora"]
  questions:
    - questiontext: "Met wie werkt Fatima van 12.00 tot 16.00 uur?"
      options:
        - label: A
          text: "Met Iris."
        - label: B
          text: "Met Nora."
        - label: C
          text: "Met Leo."
      correct_answer: A
    - questiontext: "Op welke afdeling werkt Fatima van 16.00 tot 20.00 uur?"
      options:
        - label: A
          text: "De Linde."
        - label: B
          text: "De Roos."
        - label: C
          text: "Keuken."
      correct_answer: B
    - questiontext: "Wie werkt er in de keuken van 08.00 tot 12.00 uur?"
      options:
        - label: A
          text: "Mehmet."
        - label: B
          text: "Nora."
        - label: C
          text: "Leo."
      correct_answer: C
