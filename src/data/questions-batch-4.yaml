    options:
    - label: A
      text: Omdat de ladder dan nat wordt.
    - label: B
      text: Omdat inbrekers de ladder kunnen gebruiken.
    - label: C
      text: Omdat de buren dat niet mooi vinden.
    correct_answer: B
- id: 103
  title: Hardloopevenement inschrijven
  difficulty: medium
  text: 'Op 15 juni is er een hardloopevenement in het park. Je kunt kiezen uit drie
    afstanden: 5 kilometer, 10 kilometer of 15 kilometer. Inschrijven kost € 12 voor
    de 5 km, € 15 voor de 10 km en € 18 voor de 15 km. Studenten krijgen 20% korting.
    Inschrijven kan tot 10 juni op www.hardlopeninhetpark.nl. Op de dag zelf kun je
    ook inschrijven, maar dan betaal je € 3 extra.

    '
  questions:
  - questiontext: Hoeveel afstanden kun je kiezen?
    options:
    - label: A
      text: Twee.
    - label: B
      text: Drie.
    - label: C
      text: Vier.
    correct_answer: C
  - questiontext: Hoeveel betaalt een student voor de 10 km?
    options:
    - label: A
      text: € 12.
    - label: B
      text: € 15.
    - label: C
      text: € 18.
    correct_answer: A
  - questiontext: Wat gebeurt er als je op de dag zelf inschrijft?
    options:
    - label: A
      text: Je krijgt korting.
    - label: B
      text: Je betaalt € 3 extra.
    - label: C
      text: Je kunt alleen de 5 km lopen.
    correct_answer: B
- id: 104
  title: Lekkage melden bij woningbouw
  difficulty: medium
  text: 'In de keuken druppelt water uit het plafond. Maria belt de woningbouwvereniging.
    Het telefoonnummer voor reparaties is 088-200 30 40, bereikbaar van maandag tot
    vrijdag van 08.00 tot 17.00 uur. Maria vertelt over de lekkage. De medewerker
    zegt: "Wij sturen morgen een monteur. Hij komt tussen 09.00 en 12.00 uur. Zorg
    dat iemand thuis is." Maria noteert de afspraak en wacht op de monteur.

    '
  questions:
  - questiontext: Waarom belt Maria de woningbouw?
    options:
    - label: A
      text: Om huur te betalen.
    - label: B
      text: Om een lekkage te melden.
    - label: C
      text: Om te klagen over de buren.
    correct_answer: C
  - questiontext: Wanneer komt de monteur?
    options:
    - label: A
      text: Vandaag tussen 09.00 en 12.00 uur.
    - label: B
      text: Morgen tussen 09.00 en 12.00 uur.
    - label: C
      text: Morgen tussen 13.00 en 17.00 uur.
    correct_answer: A
  - questiontext: Wat moet Maria doen op het moment dat de monteur komt?
    options:
    - label: A
      text: Niets, de monteur komt vanzelf.
    - label: B
      text: Zorgen dat iemand thuis is.
    - label: C
      text: Zelf de lekkage repareren.
    correct_answer: B
- id: 105
  title: 'Phishing mail herkennen: subtiele signalen'
  difficulty: hard
  text: 'Ali krijgt een e-mail die lijkt van zijn bank te komen. De mail zegt dat
    zijn rekening is geblokkeerd en hij moet snel zijn gegevens controleren. Er staat
    een link in de mail. Ali twijfelt. Hij kijkt goed naar het e-mailadres: het is
    info@bank-nederland.nl, niet @abn.nl of @ing.nl. De mail zegt ook: "U moet binnen
    24 uur reageren, anders wordt uw rekening permanent geblokkeerd." Ali weet dat
    echte banken nooit zo''n druk uitoefenen. Hij klikt niet op de link, maar gaat
    zelf naar de website van zijn bank door het adres in te typen. Daar ziet hij dat
    er geen probleem is.

    '
  questions:
  - questiontext: Waarom is deze e-mail waarschijnlijk phishing?
    options:
    - label: A
      text: Omdat de bank nooit e-mails stuurt.
    - label: B
      text: Omdat het e-mailadres niet van de echte bank is en er druk wordt uitgeoefend.
    - label: C
      text: Omdat er een spelfout in de e-mail staat.
    - label: D
      text: Omdat Ali geen rekening bij deze bank heeft.
    correct_answer: C
  - questiontext: Wat doet Ali in plaats van op de link klikken?
    options:
    - label: A
      text: Hij verwijdert de mail.
    - label: B
      text: Hij belt de bank.
    - label: C
      text: Hij gaat zelf naar de website van zijn bank.
    - label: D
      text: Hij stuurt de mail door naar een vriend.
    correct_answer: A
  - questiontext: Wat is de hoofdboodschap van deze tekst?
    options:
    - label: A
      text: Wees voorzichtig met online activiteiten.
    - label: B
      text: Lees altijd de voorwaarden.
    - label: C
      text: Bel altijd de klantenservice.
    - label: D
      text: Bewaar alle bonnen.
    correct_answer: B
- id: 106
  title: 'Consumentenbond: klacht indienen'
  difficulty: hard
  text: 'Fatima koopt een wasmachine van € 500. Na drie maanden gaat de machine kapot.
    Ze belt de winkel, maar de verkoper zegt: "U moet maar naar de fabrikant bellen."
    Fatima is niet tevreden. Ze raadpleegt de Consumentenbond. Daar leest ze: "Volgens
    de wet is de verkoper verantwoordelijk voor garantie, niet de fabrikant." Fatima
    stuurt een brief naar de winkel waarin ze verwijst naar de wet. De winkel biedt
    aan de wasmachine gratis te repareren. Als de winkel dat niet had gedaan, kon
    Fatima naar de Geschillencommissie gaan.

    '
  questions:
  - questiontext: Wie is volgens de wet verantwoordelijk voor garantie?
    options:
    - label: A
      text: De fabrikant.
    - label: B
      text: De verkoper.
    - label: C
      text: De Consumentenbond.
    - label: D
      text: De klant zelf.
    correct_answer: C
  - questiontext: Wat doet Fatima als de winkel niet wil helpen?
    options:
    - label: A
      text: Ze koopt een nieuwe wasmachine.
    - label: B
      text: Ze belt de fabrikant.
    - label: C
      text: Ze kan naar de Geschillencommissie gaan.
    - label: D
      text: Ze doet niets.
    correct_answer: A
- id: 107
  title: 'Online bestellen: retourbeleid'
  difficulty: hard
  text: 'Karim bestelt een laptop online van € 800. Hij krijgt de laptop thuis en
    ziet dat het toetsenbord niet prettig typt. Hij wil de laptop retourneren. Op
    de website staat: "U heeft 14 dagen bedenktijd. De laptop moet in originele verpakking
    retour komen. De kosten voor retourzending zijn voor uw rekening." Karim stuurt
    de laptop terug met PostNL. De kosten zijn € 15. Na een week krijgt hij zijn geld
    terug: € 800. De retourkosten van € 15 krijgt hij niet terug. Karim is tevreden,
    want hij heeft nu een andere laptop gekocht die wel goed werkt.

    '
  questions:
  - questiontext: Hoeveel dagen bedenktijd heeft Karim?
    options:
    - label: A
      text: 7 dagen.
    - label: B
      text: 14 dagen.
    - label: C
      text: 30 dagen.
    - label: D
      text: 60 dagen.
    correct_answer: B
  - questiontext: Wat krijgt Karim terug na retourname?
    options:
    - label: A
      text: € 800 en de retourkosten.
    - label: B
      text: Alleen € 800.
    - label: C
      text: € 785.
    - label: D
      text: Niets.
    correct_answer: C
- id: 108
  title: 'Tweefactorauthenticatie: hoe het werkt'
  difficulty: hard
  text: 'Tweefactorauthenticatie (2FA) maakt inloggen veiliger. Je hebt dan twee dingen
    nodig: iets dat je weet (je wachtwoord) en iets dat je hebt (je telefoon). Na
    het invullen van je wachtwoord krijg je een code via sms of een app. Zelfs als
    iemand je wachtwoord steelt, kan hij niet inloggen zonder je telefoon. Je kunt
    2FA instellen bij de beveiligingsinstellingen van je account. Kies voor een app
    in plaats van sms, want apps zijn veiliger. Sms''jes kunnen onderschept worden.
    Bewaar je herstelcodes goed voor het geval je je telefoon kwijtraakt.

    '
  questions:
  - questiontext: Wat zijn de twee factoren bij 2FA?
    options:
    - label: A
      text: Twee wachtwoorden.
    - label: B
      text: Iets dat je weet en iets dat je hebt.
    - label: C
      text: Je naam en geboortedatum.
    - label: D
      text: Je e-mailadres en telefoonnummer.
    correct_answer: A
  - questiontext: Waarom is een app veiliger dan sms?
    options:
    - label: A
      text: Omdat een app sneller is.
    - label: B
      text: Omdat sms'jes onderschept kunnen worden.
    - label: C
      text: Omdat een app gratis is.
    - label: D
      text: Omdat een app mooier is.
    correct_answer: B
- id: 109
  title: 'Huisartsenpost: wanneer bellen?'
  difficulty: hard
  text: 'De huisartsenpost is er voor spoedgevallen buiten kantoortijden. Je belt
    de huisartsenpost als je ''s avonds, ''s nachts of in het weekend dringend een
    huisarts nodig hebt. Bijvoorbeeld bij hoge koorts die niet zakt, ernstige pijn
    of een wond die niet stopt met bloeden. De huisartsenpost is niet voor gewone
    zaken zoals een verkoudheid of een herhaalrecept. Daarvoor kun je wachten tot
    de huisarts weer open is. Als je belt, vraagt de assistent naar je klachten. Soms
    moet je naar de post komen, soms geeft de assistent advies per telefoon.

    '
  questions:
  - questiontext: Wanneer bel je de huisartsenpost?
    options:
    - label: A
      text: Voor een herhaalrecept.
    - label: B
      text: Voor een gewone verkoudheid.
    - label: C
      text: Bij spoedgevallen buiten kantoortijden.
    - label: D
      text: Om een afspraak te maken voor volgende week.
    correct_answer: C
  - questiontext: Wat is GEEN reden om de huisartsenpost te bellen?
    options:
    - label: A
      text: Hoge koorts die niet zakt.
    - label: B
      text: Een wond die niet stopt met bloeden.
    - label: C
      text: Een verkoudheid.
    - label: D
      text: Ernstige pijn.
    correct_answer: A
- id: 110
  title: 'Koop op afstand: uitzonderingen'
  difficulty: hard
  text: 'Bij koop op afstand heb je 14 dagen bedenktijd, maar er zijn uitzonderingen.
    Je kunt bijvoorbeeld geen tickets voor concerten of vliegtuigmaatschappijen retourneren.
    Ook bederfelijke producten zoals voedsel kun je niet terugsturen. Producten die
    speciaal voor jou zijn gemaakt, zoals een trui met jouw naam erop, vallen ook
    buiten het retourrecht. Digitale inhoud zoals muziek of software kun je niet retourneren
    als je het al hebt gedownload. Lees altijd de voorwaarden voordat je iets koopt.

    '
  questions:
  - questiontext: Welk product kun je NIET retourneren?
    options:
    - label: A
      text: Een trui.
    - label: B
      text: Een ticket voor een concert.
    - label: C
      text: Een boek.
    - label: D
      text: Een laptop.
    correct_answer: B
  - questiontext: Waarom kun je bederfelijke producten niet retourneren?
    options:
    - label: A
      text: Omdat ze te zwaar zijn.
    - label: B
      text: Omdat ze snel bederven.
    - label: C
      text: Omdat ze te goedkoop zijn.
    - label: D
      text: Omdat ze niet in de verpakking zitten.
    correct_answer: C
- id: 111
  title: Brandveiligheid in huis
  difficulty: hard
  text: 'Om brand te voorkomen, zijn er belangrijke regels. Rook niet in bed en zorg
    dat sigaretten goed uit zijn. Laat kaarsen nooit onbebrand achter. Controleer
    elektrische apparaten op beschadigde snoeren. Hang een brandmelder op elke verdieping
    en test deze maandelijks. Maak een vluchtplan: weet hoe je het huis kunt verlaten
    als er brand is. Oefen het plan met je gezin. Als er brand is: voel eerst of de
    deur warm is voordat je hem opent. Als de deur warm is, is er brand aan de andere
    kant. Gebruik dan een andere uitgang.

    '
  questions:
  - questiontext: Wat moet je doen met kaarsen?
    options:
    - label: A
      text: Ze onbebrand laten.
    - label: B
      text: Ze nooit onbebrand laten.
    - label: C
      text: Ze in bed zetten.
    - label: D
      text: Ze elke dag aansteken.
    correct_answer: A
  - questiontext: Hoe vaak moet je een brandmelder testen?
    options:
    - label: A
      text: Elke week.
    - label: B
      text: Elke maand.
    - label: C
      text: Elk jaar.
    - label: D
      text: Nooit.
    correct_answer: B
- id: 112
  title: 'Internetbankieren: veiligheidsregels'
  difficulty: hard
  text: 'Internetbankieren is handig, maar je moet veilig zijn. Gebruik nooit openbare
    wifi om te bankieren, want die is niet veilig. Gebruik je eigen wifi thuis of
    mobiele data. Controleer altijd of de website begint met https:// en een slotje
    heeft. Dat betekent dat de verbinding veilig is. Deel nooit je wachtwoord of codes
    met anderen, ook niet met de bank. De bank vraagt nooit om je wachtwoord. Gebruik
    tweefactorauthenticatie voor extra beveiliging. Controleer regelmatig je afschriften
    op onbekende transacties. Als je iets verdachts ziet, bel meteen je bank.

    '
  questions:
  - questiontext: Waarom moet je geen openbare wifi gebruiken om te bankieren?
    options:
    - label: A
      text: Omdat het te langzaam is.
    - label: B
      text: Omdat het niet veilig is.
    - label: C
      text: Omdat het te duur is.
    - label: D
      text: Omdat de bank dat niet toestaat.
    correct_answer: C
  - questiontext: Wat betekent https:// en een slotje?
    options:
    - label: A
      text: Dat de website mooi is.
    - label: B
      text: Dat de verbinding veilig is.
    - label: C
      text: Dat de website snel is.
    - label: D
      text: Dat de website gratis is.
    correct_answer: A
- id: 113
  title: 'Garantie claimen: bewijslast'
  difficulty: hard
  text: 'Als je garantie wilt claimen, moet je kunnen bewijzen dat je het product
    hebt gekocht. Bewaar daarom altijd de bon of het aankoopbewijs. Zonder bon kan
    de winkel weigeren om het product te repareren of vervangen. Sommige winkels bieden
    een digitale bon aan via e-mail. Dat is ook geldig als bewijs. Als je de bon kwijt
    bent, kun je proberen om het aankoopbewijs op te vragen bij je bank via je afschriften.
    De winkel kan dan zien dat je iets hebt gekocht, maar ze zijn niet verplicht om
    dat te accepteren.

    '
  questions:
  - questiontext: Waarom moet je de bon bewaren?
    options:
    - label: A
      text: Om het product te kunnen gebruiken.
    - label: B
      text: Om te bewijzen dat je het product hebt gekocht.
    - label: C
      text: Om korting te krijgen.
    - label: D
      text: Om het product te kunnen ruilen.
    correct_answer: B
  - questiontext: Wat kun je doen als je de bon kwijt bent?
    options:
    - label: A
      text: Niets.
    - label: B
      text: Het aankoopbewijs opvragen bij je bank.
    - label: C
      text: Een nieuwe bon vragen.
    - label: D
      text: Het product terugbrengen zonder bewijs.
    correct_answer: C
