- id: 4
  title: "Verkiezingen"
  difficulty: medium
  text: |
    Fatima mag voor het eerst stemmen. Zij leest informatie van de gemeente.

    Gemeenteraadsverkiezingen — 16 maart

    Op 16 maart zijn er verkiezingen voor de gemeenteraad. U stemt op de partij die u het beste vindt. De gemeenteraad beslist over belangrijke dingen in uw buurt: nieuwe huizen, parken, scholen en sportvelden.

    Hoe stemt u?
    - U krijgt thuis een stempas.
    - Ga naar het stembureau in uw buurt.
    - Neem uw stempas en uw ID-kaart of paspoort mee.
    - U mag stemmen van 07.30 tot 21.00 uur.
    - Kunt u niet zelf stemmen? Machtig iemand anders. Vul de achterkant van de stempas in.
  questions:
    - questiontext: "Waarover beslist de gemeenteraad?"
      options:
        - label: A
          text: "Over politie en het leger."
        - label: B
          text: "Over nieuwe huizen, parken en scholen."
        - label: C
          text: "Over belasting in heel Nederland."
      correct_answer: B
    - questiontext: "Wat moet Fatima meenemen naar het stembureau?"
      options:
        - label: A
          text: "Alleen haar stempas."
        - label: B
          text: "Haar stempas en een pen."
        - label: C
          text: "Haar stempas en ID-kaart of paspoort."
      correct_answer: C

