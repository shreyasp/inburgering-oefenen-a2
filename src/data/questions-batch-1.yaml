- id: 1
  title: "Afval scheiden"
  difficulty: easy
  text: |
    Rachid krijgt een folder van de gemeente over afval.

    Afval scheiden: zo doet u dat!

    In onze gemeente scheiden wij afval. Dat is goed voor het milieu.

    - Groene bak: groente, fruit, etensresten en tuinafval.
    - Blauwe bak: papier en karton.
    - Oranje bak: plastic, metaal en drinkpakken.
    - Grijze bak: al het andere afval.

    Glas brengt u naar de glasbak in de straat. Klein chemisch afval (batterijen, verf) brengt u naar de milieustraat.
    De grijze bak wordt 1 keer per week geleegd. De andere bakken 1 keer per 2 weken.
  questions:
    - questiontext: "In welke bak moet Rachid een leeg plastic flesje doen?"
      options:
        - label: A
          text: "De groene bak."
        - label: B
          text: "De blauwe bak."
        - label: C
          text: "De oranje bak."
        - label: D
          text: "De grijze bak."
      correct_answer: C
    - questiontext: "Wat moet Rachid doen met oude batterijen?"
      options:
        - label: A
          text: "In de grijze bak doen."
        - label: B
          text: "Naar de glasbak brengen."
        - label: C
          text: "Naar de milieustraat brengen."
      correct_answer: C

