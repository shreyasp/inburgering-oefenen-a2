    Wilt u een afspraak maken? Bel ons tussen 08.00 en 10.30 uur op werkdagen: 020-555 12 34.

    Spoedgevallen: bel direct 020-555 12 35. Buiten kantoortijden belt u de huisartsenpost: 088-003 06 00.

    Voor een herhaalrecept kunt u bellen van 14.00 tot 16.00 uur.
