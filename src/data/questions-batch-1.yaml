- id: 18
  title: "Gezond eten"
  difficulty: hard
  text: |
    Voedingscentrum
    Advies voor gezond eten

    Het Voedingscentrum geeft tips voor gezonde voeding:

    1. Eet elke dag groente en fruit. U heeft 200 gram groente en 2 stuks fruit nodig per dag.

    2. Drink genoeg water. Minimaal 1,5 liter per dag. Drink niet te veel frisdrank of sap.

    3. Eet volkoren producten. Kies voor volkorenbrood in plaats van wit brood. Volkoren geeft meer energie.

    4. Eet vis 1 keer per week. Vis is goed voor uw hart.

    5. Eet niet te veel zout en suiker. Te veel zout is slecht voor uw bloeddruk.

    6. Beweeg elke dag minimaal 30 minuten. Wandelen en fietsen zijn goed.

    Meer informatie? Kijk op www.voedingscentrum.nl of bel 070-322 4444.
  questions:
