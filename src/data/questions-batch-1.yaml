- id: 6
  title: "Openbaar vervoer"
  difficulty: easy
  text: |
    Ali gaat met de trein naar Amsterdam. Hij leest dit bericht van NS.

    Werkzaamheden: geen treinen tussen Utrecht en Amsterdam

    Van 10 tot 13 november rijden er geen treinen tussen Utrecht Centraal en Amsterdam Centraal. Dit komt door werkzaamheden aan het spoor. Er rijden bussen in plaats van treinen. Houd rekening met extra reistijd van ongeveer 30 minuten.

    U kunt ook reizen via Hilversum. Die route is langer maar u blijft dan in de trein zitten.

    Meer informatie: www.ns.nl of bel 030-751 51 55.
  questions:
    - questiontext: "Waarom rijden er geen treinen tussen Utrecht en Amsterdam?"
      options:
        - label: A
          text: "Er is een ongeluk gebeurd."
        - label: B
          text: "Er is een staking van het personeel."
        - label: C
          text: "Er zijn werkzaamheden aan het spoor."
      correct_answer: C
    - questiontext: "Hoeveel extra tijd kost de reis met de bus?"
      options:
        - label: A
          text: "Ongeveer 10 minuten."
        - label: B
          text: "Ongeveer 30 minuten."
        - label: C
          text: "Ongeveer 60 minuten."
      correct_answer: B

- id: 7
  title: "Brief van de gemeente"
  difficulty: hard
  text: |
    Yuri krijgt een brief van de gemeente.

    Gemeente Den Haag
    Afdeling Burgerzaken

    Geachte heer Yuri Petrov,

    U staat ingeschreven in onze gemeente sinds 2020. Wij hebben van u nog geen zorgverzekering in ons systeem staan. In Nederland is een zorgverzekering verplicht voor iedereen van 18 jaar en ouder.

    U moet binnen 3 maanden een zorgverzekering afsluiten. Doet u dat niet? Dan krijgt u een boete van € 402,24. U krijgt dan ook een brief van het CAK. Het CAK kan u ook nog een tweede boete sturen.

    Heeft u al een zorgverzekering? Stuur dan een kopie van uw polis naar burgerzaken@denhaag.nl.

    Met vriendelijke groet,
    Afdeling Burgerzaken
  questions:
    - questiontext: "Wat ontbreekt er volgens de gemeente bij Yuri?"
      options:
        - label: A
          text: "Een ID-kaart."
        - label: B
          text: "Een inschrijving bij de gemeente."
        - label: C
          text: "Een zorgverzekering."
      correct_answer: C
    - questiontext: "Hoeveel bedraagt de boete als Yuri geen zorgverzekering afsluit?"
      options:
        - label: A
          text: "€ 200."
        - label: B
          text: "€ 402,24."
        - label: C
          text: "€ 500."
