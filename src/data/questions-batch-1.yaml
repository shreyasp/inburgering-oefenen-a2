- id: 9
  title: "Koningsdag"
  difficulty: easy
  text: |
    Svetlana leest over Koningsdag in een tijdschrift.

    Koningsdag — 27 april!

    Op 27 april viert Nederland de verjaardag van koning Willem-Alexander. Dit feest heet Koningsdag. Het hele land is oranje! Wat kunt u doen op Koningsdag?

    - De vrijmarkt: Overal in Nederland verkopen mensen oude spullen op straat. Iedereen mag gratis verkopen. U hoeft geen vergunning te hebben.
    - Festivals: In elke grote stad zijn er muziekfestivals. In Amsterdam is het grootste feest.
    - Oranje kleding dragen: Bijna iedereen draagt oranje kleren, een oranje hoed of een oranje pruik.
    - Oranje eten: U kunt oranje tompoucen eten. Dat is een typische lekkernij op Koningsdag.

    Let op: de meeste winkels zijn dicht. Supermarkten zijn vaak wel open, maar tot 18.00 uur.
  questions:
    - questiontext: "Waarom viert Nederland Koningsdag?"
      options:
        - label: A
          text: "Omdat de koning jarig is."
        - label: B
          text: "Omdat Nederland jarig is."
        - label: C
          text: "Omdat de koningin jarig is."
      correct_answer: A
    - questiontext: "Mag Svetlana gratis spullen verkopen op straat?"
      options:
        - label: A
          text: "Ja, dat mag, zij heeft geen vergunning nodig."
        - label: B
          text: "Nee, zij moet eerst een vergunning kopen."
        - label: C
          text: "Ja, maar alleen in Amsterdam."
      correct_answer: A

