  text: |
    Hoe koopt en gebruikt u een OV-chipkaart?

    Een OV-chipkaart is nodig voor de bus, tram, metro en trein in heel Nederland.

    Stap 1: Koop een kaart bij de automaat in het station of bij de supermarkt. Een lege kaart kost € 7,50.
    Stap 2: Zet er geld op (opladen). Dit kan bij de automaat of online op www.ov-chipkaart.nl.
    Stap 3: Check in bij het instappen en check uit bij het uitstappen.

    Let op: u moet minimaal € 4 op uw kaart hebben om in te checken.

    Anonieme kaart: voor iedereen, niet op naam.
    Persoonlijke kaart: op uw naam, met foto. Kost € 10. U kunt hiermee ook abonnementen kopen.

    Kaart kwijt? Bij een persoonlijke kaart kunt u het geld terugkrijgen.
