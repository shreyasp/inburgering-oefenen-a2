    identiteitskaart zijn €63,10 bij de gemeente.
  questions:
    - questiontext: Wat neemt Karim mee naar het politiebureau?
      options:
        - label: A
          text: Alleen zijn identiteitskaart.
        - label: B
          text: Zijn identiteitskaart en het framenummer.
        - label: C
          text: Het aankoopbewijs van de fiets.
      correct_answer: B
    - questiontext: Wat kan Karim doen met het proces-verbaal?
      options:
        - label: A
          text: Een nieuwe fiets kopen.
        - label: B
          text: Een nieuwe fiets claimen bij de verzekering.
        - label: C
          text: Naar de rechtbank gaan.
      correct_answer: B
    - questiontext: Hoeveel betaalt Karim voor de identiteitskaart?
      options:
        - label: A
          text: €41,35
        - label: B
          text: €53,10
        - label: C
          text: €63,10
      correct_answer: C
- id: 105
  title: Prinsjesdag
  difficulty: medium
  text: >
    Op de derde dinsdag van september is het Prinsjesdag. De Koning rijdt in de Gouden Koets door Den Haag naar de
    Ridderzaal. Daar leest hij de Troonrede voor. In de Troonrede staan de plannen van de regering voor het komende
    jaar. Ook presenteert de minister van Financiën de Miljoenennota. Daar staat in hoeveel geld er is voor scholen,
    ziekenhuizen en wegen. Mensen kijken op televisie. Buiten staan veel mensen te kijken naar de koets. Kinderen hebben
    een vrije dag van school.
  questions:
    - questiontext: Wanneer is Prinsjesdag?
      options:
        - label: A
          text: Op de eerste dinsdag van september.
        - label: B
          text: Op de derde dinsdag van september.
        - label: C
          text: Op de derde maandag van september.
      correct_answer: B
    - questiontext: Wat staat er in de Troonrede?
      options:
        - label: A
          text: De geschiedenis van Nederland.
        - label: B
          text: De plannen van de regering voor het komende jaar.
        - label: C
          text: De namen van alle ministers.
      correct_answer: B
- id: 108
  title: Dodenherdenking en Bevrijdingsdag
  difficulty: medium
  text: >-
    Op 4 mei is het Dodenherdenking. Om 20.00 uur staat heel Nederland twee minuten stil. De Koning en Koningin leggen
    een krans bij het Nationaal Monument op de Dam in Amsterdam. Mensen herdenken alle Nederlanders die zijn omgekomen
    sinds het begin van de Tweede Wereldoorlog. De volgende dag, 5 mei, is het Bevrijdingsdag. Dan vieren we dat
    Nederland vrij is sinds 1945. Er zijn festivals in het hele land. Bevrijdingsdag is elke vijf jaar een officiële
    vrije dag.
     Ze staan twee minuten stil.
  questions:
    - questiontext: Wat doen mensen om 20.00 uur op 4 mei?
      options:
        - label: A
          text: Ze zingen het volkslied.
        - label: B
          text: Ze staan twee minuten stil.
        - label: C
          text: Ze gaan naar een festival.
      correct_answer: B
    - questiontext: Wanneer is Bevrijdingsdag een officiële vrije dag?
      options:
        - label: A
          text: Elk jaar.
        - label: B
          text: Elke vijf jaar.
        - label: C
          text: Elke tien jaar.
      correct_answer: B
- id: 110
  title: Carnaval en Suikerfeest
  difficulty: medium
  text: >
    In februari is er carnaval in het zuiden van Nederland. In Maastricht en Den Bosch is het drie dagen feest. Mensen
    verkleden zich en lopen in optochten door de straten. Veel scholen en winkels zijn dicht. In het voorjaar is er ook
    het Suikerfeest. Dit is een islamitisch feest na de ramadan. De ramadan duurt een maand. Tijdens de ramadan vasten
    moslims van zonsopgang tot zonsondergang. Na de ramadan vieren ze het Suikerfeest. Mensen bezoeken familie en eten
    zoetigheden.
  questions:
    - questiontext: Waar is carnaval het populairst?
      options:
        - label: A
          text: In het noorden van Nederland.
        - label: B
          text: In het zuiden van Nederland.
        - label: C
          text: In het westen van Nederland.
      correct_answer: B
    - questiontext: Wat doen moslims tijdens de ramadan?
      options:
        - label: A
          text: Ze eten de hele dag.
        - label: B
          text: Ze vasten van zonsopgang tot zonsondergang.
        - label: C
          text: Ze gaan op vakantie.
      correct_answer: B
- id: 112
  title: Fietscultuur in Nederland
  difficulty: medium
  text: >-
    Nederlanders houden van fietsen. Er zijn meer fietsen dan mensen in Nederland. In steden als Amsterdam en Utrecht
    zijn speciale fietspaden. Mensen fietsen naar werk, school en de winkel. Een goede fiets kost tussen de €500 en
    €1000. Veel mensen kopen een tweedehands fiets voor €150. Het is belangrijk om een goed slot te kopen, want
    fietsdiefstal komt veel voor. Een verzekering voor de fiets kost ongeveer €5 per maand.
     Meer dan het aantal mensen.
  questions:
    - questiontext: Hoeveel fietsen zijn er in Nederland?
      options:
        - label: A
          text: Minder dan het aantal mensen.
        - label: B
          text: Meer dan het aantal mensen.
        - label: C
          text: Precies evenveel als mensen.
      correct_answer: B
- id: 113
  title: WMO-aanvraag en PGB
  difficulty: hard
  text: >
    Mevrouw de Boer is 75 jaar en woont alleen. Ze kan niet meer goed schoonmaken en boodschappen doen. Ze vraagt hulp
    aan bij de gemeente via de Wet Maatschappelijke Ondersteuning (WMO). De gemeente stuurt een consulent die haar
    situatie thuis beoordeelt. De consulent zegt dat mevrouw de Boer recht heeft op hulp. Ze kan kiezen: de gemeente
    regelt een hulp via een zorginstelling, of mevrouw de Boer krijgt een persoonsgebonden budget (PGB). Met een PGB kan
    ze zelf iemand inhuren, bijvoorbeeld een buurvrouw. Het PGB is €12 per uur. De buurvrouw helpt drie uur per week.
    Mevrouw de Boer kiest voor het PGB, want ze kent de buurvrouw al en vertrouwt haar. De gemeente controleert elk half
    jaar of het geld goed wordt besteed.
  questions:
    - questiontext: Waarom vraagt mevrouw de Boer hulp aan?
      options:
        - label: A
          text: Ze is ziek en moet naar het ziekenhuis.
        - label: B
          text: Ze kan niet meer goed schoonmaken en boodschappen doen.
        - label: C
          text: Ze wil verhuizen naar een verzorgingstehuis.
      correct_answer: B
    - questiontext: Wat is het verschil tussen de twee opties?
      options:
        - label: A
          text: Bij de eerste optie regelt de gemeente de hulp, bij de tweede optie huurt mevrouw de Boer zelf iemand in.
        - label: B
          text: De eerste optie is gratis, de tweede optie kost geld.
        - label: C
          text: De eerste optie is voor jonge mensen, de tweede voor ouderen.
      correct_answer: A
    - questiontext: Waarom kiest mevrouw de Boer voor het PGB?
      options:
        - label: A
          text: Omdat het meer geld oplevert.
        - label: B
          text: Omdat ze de buurvrouw al kent en vertrouwt.
        - label: C
          text: Omdat de gemeente dat verplicht stelt.
      correct_answer: B
- id: 116
  title: Kraamzorg na de geboorte
  difficulty: hard
  text: >
    Sarah is net bevallen van haar eerste kindje. Ze heeft recht op kraamzorg. De kraamhulp komt acht dagen langs. De
    eerste drie dagen helpt de kraamhulp de hele dag, de laatste vijf dagen komt ze een paar uur. De kraamhulp helpt met
    de verzorging van de baby, geeft advies over voeding en doet lichte huishoudelijke taken. De kosten worden betaald
    vanuit de zorgverzekering, maar Sarah moet wel het eigen risico betalen. De kraamhulp leert Sarah ook hoe ze de baby
    moet wassen en voeden. Als er complicaties zijn, kan de kraamzorg langer duren, maar dat moet de arts dan wel
    goedkeuren.
  questions:
    - questiontext: Hoe lang komt de kraamhulp in totaal?
      options:
        - label: A
          text: Drie dagen.
        - label: B
          text: Vijf dagen.
        - label: C
          text: Acht dagen.
      correct_answer: C
    - questiontext: Wat moet Sarah betalen vanuit haar verzekering?
      options:
        - label: A
          text: Niets, alles wordt vergoed.
        - label: B
          text: Het eigen risico.
        - label: C
          text: De helft van de kosten.
      correct_answer: B
- id: 118
  title: Studiefinanciering van DUO
  difficulty: hard
  text: >
    Fatima is 18 jaar en gaat studeren aan de Universiteit van Amsterdam. Ze vraagt studiefinanciering aan bij DUO. Ze
    krijgt een basisbeurs van €296,36 per maand. Daarnaast kan ze een aanvullende beurs krijgen als haar ouders minder
    verdienen. Fatima's moeder verdient €35.000 per jaar, dus Fatima krijgt ook een aanvullende beurs van €150 per
    maand. Ze kan ook een studentenreisproduct krijgen voor het ov. Dit is een lening die ze later moet terugbetalen als
    ze werkt. DUO betaalt het ov-product direct aan de vervoerder. Fatima moet elk jaar haar inkomen doorgeven, anders
    stopt de beurs. Als ze binnen tien jaar afstudeert, wordt de lening omgezet in een gift.
  questions:
    - questiontext: Hoeveel krijgt Fatima in totaal per maand aan beurzen?
      options:
        - label: A
          text: €296,36
        - label: B
          text: €446,36
        - label: C
          text: €550,00
      correct_answer: B
    - questiontext: Wanneer wordt de lening omgezet in een gift?
      options:
        - label: A
          text: Als Fatima binnen vijf jaar afstudeert.
        - label: B
          text: Als Fatima binnen tien jaar afstudeert.
        - label: C
          text: Als Fatima gaat werken.
      correct_answer: B
- id: 121
  title: NT2-examen en diploma laten waarderen
  difficulty: hard
  text: >
    Ahmed wil gaan werken als verpleegkundige in Nederland. Hij heeft een diploma uit Marokko. Voordat hij kan werken,
    moet hij twee dingen doen. Ten eerste moet hij het NT2-examen doen op niveau B1. Dat examen heeft vier onderdelen:
    lezen, luisteren, spreken en schrijven. Ahmed oefent zes maanden en doet het examen bij DUO in Utrecht. Hij haalt
    alle onderdelen. Ten tweede moet hij zijn Marokkaanse diploma laten waarderen door IDW. Dat duurt acht weken en kost
    €160. IDW vergelijkt het diploma met Nederlandse diploma's. Ahmed zijn diploma is gelijk aan een mbo-4-niveau. Nu
    kan hij solliciteren als verpleegkundige.
  questions:
    - questiontext: Welke twee dingen moet Ahmed doen voordat hij kan werken?
      options:
        - label: A
          text: Het NT2-examen doen en solliciteren.
        - label: B
          text: Het NT2-examen doen en zijn diploma laten waarderen.
        - label: C
          text: Zijn diploma laten waarderen en een cursus volgen.
      correct_answer: B
    - questiontext: Hoeveel onderdelen heeft het NT2-examen?
      options:
        - label: A
          text: Twee onderdelen.
        - label: B
          text: Drie onderdelen.
        - label: C
          text: Vier onderdelen.
      correct_answer: C
    - questiontext: Wat doet IDW?
      options:
        - label: A
          text: Geeft taallessen.
        - label: B
          text: Vergelijkt buitenlandse diploma's met Nederlandse diploma's.
        - label: C
          text: Regelt werk voor buitenlandse gediplomeerden.
      correct_answer: B
- id: 124
  title: Bezwaar maken tegen een beslissing
  difficulty: hard
  text: >
    Kees krijgt een brief van de gemeente. Ze zeggen dat hij meer gemeentebelasting moet betalen. Kees is het niet eens
    met de berekening. Hij wil bezwaar maken. Dat moet binnen zes weken na de datum van de brief. Kees schrijft een
    brief aan de gemeente waarin hij uitlegt waarom hij het niet eens is. Hij stuurt de brief per aangetekende post,
    want dan heeft hij bewijs dat de brief is verstuurd. De gemeente heeft zes weken de tijd om te reageren. Als de
    gemeente niet reageert, krijgt Kees automatisch gelijk. Als de gemeente wel reageert maar Kees het er nog steeds
    niet mee eens is, kan hij naar de rechter stappen. Dat moet dan binnen zes weken na de beslissing op bezwaar.
  questions:
    - questiontext: Binnen hoeveel weken moet Kees bezwaar maken?
      options:
        - label: A
          text: Binnen vier weken.
        - label: B
          text: Binnen zes weken.
        - label: C
          text: Binnen acht weken.
      correct_answer: B
    - questiontext: Waarom stuurt Kees de brief per aangetekende post?
      options:
        - label: A
          text: Omdat dat sneller is.
        - label: B
          text: Omdat hij dan bewijs heeft dat de brief is verstuurd.
        - label: C
          text: Omdat de gemeente dat verplicht stelt.
      correct_answer: B
    - questiontext: Wat gebeurt er als de gemeente niet reageert?
      options:
        - label: A
          text: Kees moet opnieuw bezwaar maken.
        - label: B
          text: Kees krijgt automatisch gelijk.
        - label: C
          text: Kees moet naar de rechter.
      correct_answer: B
- id: 127
  title: Naturalisatie tot Nederlander
  difficulty: hard
  text: >
    Maria woont al vijf jaar in Nederland. Ze komt uit Colombia. Ze wil Nederlands worden en vraagt naturalisatie aan
    bij de gemeente. Dat kost €1.025 voor een volwassene. Voordat ze kan aanvragen, moet ze aan een aantal voorwaarden
    voldoen. Ze moet een geldige verblijfsvergunning hebben. Ze moet het inburgeringsexamen hebben gehaald. Ze mag de
    laatste vier jaar geen strafblad hebben gehad. De gemeente stuurt de aanvraag naar de IND. De IND onderzoekt of
    Maria aan alle voorwaarden voldoet. Dat duurt ongeveer negen maanden. Als de IND akkoord is, moet Maria binnen zes
    maanden de naturalisatieoptie ondertekenen bij de gemeente. Als ze dat niet doet, vervalt de aanvraag. Bij de
    ondertekening doet Maria de naturalisatieceremonie en krijgt ze het Nederlandse paspoort.
  questions:
    - questiontext: Hoeveel kost naturalisatie voor een volwassene?
      options:
        - label: A
          text: €525
        - label: B
          text: €1.025
        - label: C
          text: €1.525
      correct_answer: B
    - questiontext: Hoelang duurt het onderzoek van de IND?
      options:
        - label: A
          text: Ongeveer drie maanden.
        - label: B
          text: Ongeveer zes maanden.
        - label: C
          text: Ongeveer negen maanden.
      correct_answer: C
- id: 129
  title: Waterschap en referendum
  difficulty: hard
  text: >
    In Nederland zijn er 21 waterschappen. Die zorgen voor droge voeten en schoon water. Elke vier jaar zijn er
    verkiezingen voor het waterschap. Mensen kunnen stemmen op een partij die zich bezighoudt met waterbeheer. Soms is
    er ook een referendum. Dat is een volksraadpleging over een belangrijk onderwerp. In 2018 was er in Utrecht een
    referendum over de bouw van een nieuw tramlijn. Mensen konden stemmen: voor of tegen. Een referendum is niet
    bindend, dat betekent dat de gemeente niet verplicht is om de uitslag te volgen. Maar meestal houden ze zich er wel
    aan. Om te mogen stemmen bij een referendum moet je 16 jaar of ouder zijn en in de gemeente wonen.
  questions:
    - questiontext: Waar zorgen waterschappen voor?
      options:
        - label: A
          text: Voor wegen en bruggen.
        - label: B
          text: Voor droge voeten en schoon water.
        - label: C
          text: Voor scholen en ziekenhuizen.
      correct_answer: B
    - questiontext: Wat betekent het dat een referendum niet bindend is?
      options:
        - label: A
          text: De gemeente moet de uitslag altijd volgen.
        - label: B
          text: De gemeente is niet verplicht om de uitslag te volgen.
        - label: C
          text: Het referendum is ongeldig.
      correct_answer: B
- id: 130
  title: Directheid en borrelcultuur
  difficulty: hard
  text: >
    Nederlanders staan bekend om hun directheid. Ze zeggen wat ze denken, ook als dat niet altijd aardig is.
    Buitenlanders vinden dit soms onbeleefd, maar Nederlanders zien het als eerlijk en open. Als een collega een fout
    maakt, zegt de baas dat direct. Op het werk is er ook een borrelcultuur. Na het werk gaan collega's soms samen een
    biertje drinken. Dit heet een borrel. Het is een manier om te ontspannen en elkaar beter te leren kennen. Niet
    iedereen doet mee, en dat is ook prima. De borrel is meestal op vrijdagmiddag.
  questions:
    - questiontext: Hoe zien Nederlanders hun directheid?
      options:
        - label: A
          text: Als onbeleefd en kwetsend.
        - label: B
          text: Als eerlijk en open.
        - label: C
          text: Als een manier om ruzie te maken.
      correct_answer: B
    - questiontext: Wat is het doel van de borrelcultuur?
      options:
        - label: A
          text: Om te werken tot laat.
        - label: B
          text: Om te ontspannen en elkaar beter te leren kennen.
        - label: C
          text: Om ruzie te maken met collega's.
      correct_answer: B
